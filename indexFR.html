<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .leaflet-popup-content table { font-size: 11px; border-collapse: collapse; margin: 0 1px; }
        .leaflet-control-layers-list { min-width: 230px; }
        .leaflet-popup-content tr { border-bottom: 1px solid #e0e0e0; }
        .leaflet-popup-content tr:last-child { border-bottom: none; }
        .leaflet-popup-content th { white-space: nowrap; font-weight: bold; text-align: left; padding: 2px 6px; vertical-align: top; width: 1%; }
        .leaflet-popup-content td { padding: 2px 6px; vertical-align: top; word-break: break-word; overflow-wrap: break-word; max-width: 160px; }
        .pulse-cluster { position: relative; width: 44px; height: 44px; }
        .pulse-cluster .cluster-inner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--clr);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; color: var(--txt);
            z-index: 2; border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 1px 4px rgba(0,0,0,0.35);
        }
        .pulse-cluster .pulse-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--clr); opacity: 0.55;
            animation: clusterPulse 2s ease-out infinite;
        }
        .pulse-cluster .r2 { animation-delay: 0.8s; }
        @keyframes clusterPulse {
            0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.55; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }
        .quartier-filter-control {
            background: white;
            padding: 6px 8px;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .quartier-filter-control select {
            font-size: 12px;
            border: none;
            outline: none;
            background: transparent;
            cursor: pointer;
            min-width: 185px;
            padding: 2px 0;
            color: #333;
        }
        #reinitialiser-btn {
            font-size: 12px;
            padding: 3px 6px;
            border: 1px solid #bbb;
            border-radius: 3px;
            background: #f0f0f0;
            cursor: pointer;
            color: #333;
            width: 100%;
            text-align: center;
        }
        #reinitialiser-btn:hover {
            background: #ddd;
        }
        </style>
        <title>Parkings Velo 1030</title>
        <link rel="shortcut icon" href="css/images/logo1030GeoData.ico" type="image/x-icon">
    </head>
